server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip — keeps FCP <2s on mobile 3G achievable
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Healthcheck — generated by nginx, no disk I/O
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Hashed assets — safe to cache aggressively (filenames change with content)
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Never cache the SPA shell — must always pick up new deploys
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback — serve real files when present, otherwise return the shell
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
